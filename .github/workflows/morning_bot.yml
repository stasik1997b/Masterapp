name: Morning Telegram Notification

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Process Data and Send Message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
        run: |
          python - <<EOF
          import os, json, requests, sys
          from datetime import datetime

          BOT_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID = os.environ['TELEGRAM_CHAT_ID']
          
          today_sys = datetime.now().strftime('%Y-%m-%d')
          today_user = datetime.now().strftime('%d.%m.%Y')

          # Безопасное склеивание ссылки без f-строк, чтобы избежать InvalidURL
          base_url = "https://telegram.org" + BOT_TOKEN + "/sendMessage"

          if not os.path.exists('backup_data.json'):
              msg = "☀️ Доброе утро! Сегодня " + today_user + ". База данных еще ни разу не загружалась в репозиторий GitHub."
              res = requests.post(base_url, json={"chat_id": CHAT_ID, "text": msg})
              
              if res.status_code == 200:
                  print("Аварийное сообщение успешно отправлено в Telegram!")
                  sys.exit(0)
              else:
                  print("Ошибка отправки! Код ответа:", res.status_code)
                  print("Ответ сервера Telegram:", res.text)
                  sys.exit(1)

          try:
              with open('backup_data.json', 'r', encoding='utf-8') as f:
                  payload = json.load(f)
              
              user_name = payload.get('user_name', 'Виктор')
              full_state = payload.get('full_state', {})
              orders = full_state.get('orders', [])
              
              todays_orders = [o for o in orders if o.get('date') == today_sys]
              
              if todays_orders:
                  todays_orders.sort(key=lambda x: x.get('time', ''))
                  times_list = ", ".join([o.get('time', 'Время не указано') for o in todays_orders])
                  msg = "☀️ Доброе утро, " + user_name + "! Сегодня " + today_user + " у вас " + str(len(todays_orders)) + " клиента. " + times_list + "."
              else:
                  msg = "☀️ Доброе утро, " + user_name + "! Сегодня " + today_user + " клиентов нет."

              res = requests.post(base_url, json={"chat_id": CHAT_ID, "text": msg})
              
              if res.status_code == 200:
                  print("Уведомление успешно отправлено!")
                  sys.exit(0)
              else:
                  print("Ошибка отправки основного сообщения! Код:", res.status_code)
                  print("Ответ Telegram:", res.text)
                  sys.exit(1)
              
          except Exception as e:
              error_msg = "🛑 Ошибка при чтении бэкапа: " + str(e)
              requests.post(base_url, json={"chat_id": CHAT_ID, "text": error_msg})
              print(error_msg)
              sys.exit(1)
          EOF
