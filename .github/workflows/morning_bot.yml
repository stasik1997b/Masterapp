name: Morning Telegram Notification

on:
  schedule:
    # Запуск каждый день в 04:00 по UTC (это ровно 07:00 по Минску/Москве)
    - cron: '0 4 * * *'
  workflow_dispatch: # Кнопка для ручного теста в интерфейсе GitHub

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Process Data and Send Message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
        run: |
          python - <<EOF
          import os, json, requests, sys
          from datetime import datetime

          BOT_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID = os.environ['TELEGRAM_CHAT_ID']
          
          today_sys = datetime.now().strftime('%Y-%m-%d')
          today_user = datetime.now().strftime('%d.%m.%Y')

          # 1. Проверяем, существует ли файл бэкапа в репозитории на самом деле
          if not os.path.exists('backup_data.json'):
              msg = f"☀️ Доброе утро! Сегодня {today_user}. База данных еще ни разу не загружалась в репозиторий GitHub."
              requests.post(f"https://telegram.org{BOT_TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg})
              print("Файл бэкапа не найден. Аварийное уведомление отправлено.")
              sys.exit(0)

          # 2. Если файл есть, пытаемся его прочитать и обработать
          try:
              with open('backup_data.json', 'r', encoding='utf-8') as f:
                  payload = json.load(f)
              
              user_name = payload.get('user_name', 'Виктор')
              full_state = payload.get('full_state', {})
              orders = full_state.get('orders', [])
              
              todays_orders = [o for o in orders if o.get('date') == today_sys]
              
              if todays_orders:
                  todays_orders.sort(key=lambda x: x.get('time', ''))
                  times_list = ", ".join([o.get('time', 'Время не указано') for o in todays_orders])
                  msg = f"☀️ Доброе утро, {user_name}! Сегодня {today_user} у вас {len(todays_orders)} клиента. {times_list}."
              else:
                  msg = f"☀️ Доброе утро, {user_name}! Сегодня {today_user} клиентов нет."

              requests.post(f"https://telegram.org{BOT_TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg})
              print("Уведомление успешно отправлено!")
              
          except Exception as e:
              # Если внутри JSON оказалась каша, отправим ошибку в чат
              error_msg = f"🛑 Ошибка при чтении бэкапа: {str(e)}"
              requests.post(f"https://telegram.org{BOT_TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": error_msg})
              print(error_msg)
              sys.exit(1)
          EOF
          
