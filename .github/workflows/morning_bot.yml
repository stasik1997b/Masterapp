name: Morning Telegram Notification

on:
  schedule:
    - cron: '0 4 * * *' # 7:00 утра по Минску/Москве ежедневно
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Message to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_KEY }}
          CHAT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
        run: |
          # Получаем текущую дату в формате ДД.ММ.ГГГГ
          TODAY_USER=$(date +'%d.%m.%Y')
          TODAY_SYS=$(date +'%Y-%m-%d')

          # 1. Проверяем, есть ли файл базы данных
          if [ ! -f "backup_data.json" ]; then
            MSG="☀️ Доброе утро! Сегодня $TODAY_USER. База данных еще ни разу не загружалась в репозиторий GitHub."
            
            # Отправляем через curl напрямую на сервера Telegram
            curl -s -X POST "https://telegram.org{BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=${MSG}"
            
            echo "Файл не найден. Заглушка отправлена."
            exit 0
          fi

          # 2. Если файл есть, запускаем обработку через легкий инструмент jq
          USER_NAME=$(jq -r '.user_name // "Виктор"' backup_data.json)
          
          # Фильтруем заказы на сегодня и собираем их время
          TIMES_LIST=$(jq -r --arg today "$TODAY_SYS" '.full_state.orders[] | select(.date == $today) | .time' backup_data.json | sort | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')
          COUNT=$(jq -r --arg today "$TODAY_SYS" '[.full_state.orders[] | select(.date == $today)] | length' backup_data.json)

          if [ "$COUNT" -gt 0 ]; then
            MSG="☀️ Доброе утро, ${USER_NAME}! Сегодня ${TODAY_USER} у вас ${COUNT} клиента. ${TIMES_LIST}."
          else
            MSG="☀️ Доброе утро, ${USER_NAME}! Сегодня ${TODAY_USER} клиентов нет."
          fi

          # Отправляем итоговое сообщение
          curl -s -X POST "https://telegram.org{BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}"
          
          echo "Основное уведомление отправлено."
          
