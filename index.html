<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterAPP Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col antialiased select-none">

    <div id="appContainer" class="flex-1 flex flex-col max-w-md mx-auto w-full pb-24 relative overflow-hidden bg-slate-900 shadow-2xl">
        
        <header class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-md border-b border-slate-800/80 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">

                    <i class="fa-solid fa-crown text-slate-900 text-xs"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-wide text-white">MasterAPP <span class="text-xs px-1.5 py-0.5 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 ml-1">PRO</span></h1>

                    <i class="fa-solid fa-bars text-sm"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar">
            
            <section class="bg-slate-800/40 border border-slate-800 rounded-2xl p-3.5 backdrop-blur-sm">

                    <div class="flex gap-1">

                        <button onclick="changeMonth(1)" class="w-7 h-7 rounded-lg bg-slate-800 hover:bg-slate-700 flex items-center justify-center text-slate-400 hover:text-white transition-colors active:scale-95"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>

                </div>
                <div id="calendarDaysGrid" class="grid grid-cols-7 gap-1 text-center text-[11px] font-medium text-slate-500 mb-1">
                    <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div class="text-amber-500/70">Сб</div><div class="text-rose-500/70">Вс</div>
                </div>
                <div id="calendarDatesGrid" class="grid grid-cols-7 gap-1.5 text-center"></div>
            </section>

            <section class="space-y-3">
                <div class="flex items-center justify-between px-1">
                    <div class="flex items-center gap-2">
                        <h2 class="text-sm font-bold text-white tracking-wide">Заказы на день</h2>

                    </div>
                    <button onclick="openOrderModal()" class="text-xs font-semibold text-amber-400 hover:text-amber-300 flex items-center gap-1 bg-amber-500/10 px-2.5 py-1 rounded-xl border border-amber-500/20 active:scale-95 transition-all">
                        <i class="fa-solid fa-plus text-[10px]"></i> Добавить
                    </button>
                </div>
                <div id="ordersListContainer" class="space-y-2.5"></div>
            </section>
        </section>

        <nav class="absolute bottom-0 left-0 right-0 z-40 bg-slate-900/95 border-t border-slate-800/80 px-6 py-2 flex justify-around items-center backdrop-blur-lg max-w-md mx-auto">
            <button onclick="switchTab('calendar')" id="tabBtn-calendar" class="flex flex-col items-center gap-1 text-amber-500 transition-all active:scale-95">
                <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center border border-amber-500/20 shadow-lg shadow-amber-500/5"><i class="fa-solid fa-calendar-alt text-base"></i></div>
                <span class="text-[10px] font-bold tracking-wide">Заказы</span>

            <button onclick="switchTab('analytics')" id="tabBtn-analytics" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition-all active:scale-95">

                <span class="text-[10px] font-semibold tracking-wide">Финансы</span>
            </button>
            <button onclick="switchTab('warehouse')" id="tabBtn-warehouse" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition-all active:scale-95">
                <div class="w-10 h-10 rounded-xl bg-transparent flex items-center justify-center border border-transparent"><i class="fa-solid fa-boxes-stacked text-base"></i></div>
                <span class="text-[10px] font-semibold tracking-wide">Склад</span>
            </button>
        </nav>

    </div>

    <div id="orderModal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-end justify-center px-4 pb-4">
        <div class="bg-slate-850 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4 shadow-2xl transform translate-y-10 transition-transform duration-300 ease-out bg-slate-900">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                <h3 id="orderModalTitle" class="text-sm font-bold text-white flex items-center gap-2"><i class="fa-solid fa-file-invoice text-amber-400"></i> Новый заказ</h3>
                <button onclick="closeOrderModal()" class="w-7 h-7 rounded-lg bg-slate-800 text-slate-400 hover:text-white flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark text-xs"></i></button>
            </div>
            <div class="space-y-3.5 text-xs">
                <div class="space-y-1.5">
                    <label class="font-semibold text-slate-400 flex items-center gap-1">Имя клиента *</label>
                    <input type="text" id="orderClient" placeholder="Иван Иванов" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-amber-500/80 transition-colors">
                </div>
                <div class="space-y-1.5">
                    <label class="font-semibold text-slate-400 flex items-center gap-1">Наименование товара / Услуги *</label>
                    <input type="text" id="orderProduct" placeholder="Торт «Сникерс», Сборка кухни и т.д." class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-amber-500/80 transition-colors">
                </div>
                <div class="grid grid-cols-2 gap-3.5">
                    <div class="space-y-1.5">
                        <label class="font-semibold text-slate-400">Стоимость (₽) *</label>
                        <input type="number" id="orderPrice" placeholder="0" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-amber-500/80 transition-colors">
                    </div>
                    <div class="space-y-1.5">
                        <label class="font-semibold text-slate-400">Предоплата (₽)</label>
                        <input type="number" id="orderPrepayment" placeholder="0" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-amber-500/80 transition-colors">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="font-semibold text-slate-400">Шаблон списания ресурсов</label>
                    <select id="orderTemplateSelect" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-amber-500/80 transition-colors">
                        <option value="">Без списания ресурсов</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeOrderModal()" class="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-300 font-semibold py-2.5 rounded-xl transition-colors text-xs border border-slate-700/40">Отмена</button>
                <button onclick="saveOrder()" class="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-slate-900 font-bold py-2.5 rounded-xl transition-all shadow-lg shadow-orange-500/10 text-xs">Сохранить</button>
            </div>
        </div>
    </div><div id="menuModal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-end justify-center px-4 pb-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4 shadow-2xl">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                <h3 class="text-sm font-bold text-white flex items-center gap-2"><i class="fa-solid fa-sliders text-amber-400"></i> Управление профилем</h3>
                <button onclick="closeMenuModal()" class="w-7 h-7 rounded-lg bg-slate-800 text-slate-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-xmark text-xs"></i></button>
            </div>
            <div class="space-y-4 text-xs">
                <div class="space-y-2">
                    <label class="font-semibold text-slate-400 block">Ваша специализация (Роль)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectUserProfileRole('baker')" id="roleBtn-baker" class="p-3 rounded-xl border border-slate-700 bg-slate-800/40 text-left hover:border-amber-500 transition-colors">
                            <i class="fa-solid fa-cake-candles text-amber-400 mb-1 block text-base"></i>
                            <span class="font-bold text-white block">Кондитер</span>
                            <span class="text-[10px] text-slate-400">Рецепты и ингредиенты</span>
                        </button>
                        <button onclick="selectUserProfileRole('furniture')" id="roleBtn-furniture" class="p-3 rounded-xl border border-slate-700 bg-slate-800/40 text-left hover:border-amber-500 transition-colors">
                            <i class="fa-solid fa-couch text-orange-400 mb-1 block text-base"></i>
                            <span class="font-bold text-white block">Мебельщик</span>
                            <span class="text-[10px] text-slate-400">Монтаж и фурнитура</span>
                        </button>
                    </div>
                </div>
                
                <div class="border-t border-slate-800 pt-3 space-y-2">
                    <button onclick="exportToExcel(); closeMenuModal();" class="w-full bg-slate-800 hover:bg-slate-750 text-white font-medium p-3 rounded-xl flex items-center justify-between transition-colors border border-slate-700/50">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-file-excel text-emerald-400 text-sm"></i> Скачать резервную копию Excel</span>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-500"></i>
                    </button>
                    <button onclick="clearAllData()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 font-medium p-3 rounded-xl flex items-center justify-between transition-colors border border-rose-500/20">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-trash-can text-sm"></i> Очистить данные в облаке</span>
                        <i class="fa-solid fa-chevron-right text-[10px] text-rose-500/40"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-analytics" class="hidden flex-1 flex flex-col max-w-md mx-auto w-full pb-24 px-4 pt-4 space-y-4 overflow-y-auto no-scrollbar bg-slate-900">
        <section class="grid grid-cols-2 gap-3">
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4 backdrop-blur-sm">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-0.5">Выручка (Общая)</p>
                <h3 id="financeTotalRevenue" class="text-lg font-black text-white">0 ₽</h3>
            </div>
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4 backdrop-blur-sm">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-0.5">Предоплаты</p>
                <h3 id="financeTotalPrepayments" class="text-lg font-black text-amber-400">0 ₽</h3>
            </div>
        </section>

        <section class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4 backdrop-blur-sm space-y-3.5">
            <div class="flex items-center justify-between">
                <h3 class="text-xs font-bold text-white tracking-wide uppercase text-slate-400">Журнал расходов</h3>
                <button onclick="openExpenseModal()" class="text-[11px] font-semibold text-orange-400 bg-orange-500/10 px-2.5 py-1 rounded-xl border border-orange-500/20 active:scale-95 transition-all">+ Расход</button>
            </div>
            <div id="expensesListContainer" class="space-y-2 max-h-60 overflow-y-auto no-scrollbar"></div>
        </section>
    </div>

    <div id="view-warehouse" class="hidden flex-1 flex flex-col max-w-md mx-auto w-full pb-24 px-4 pt-4 space-y-4 overflow-y-auto no-scrollbar bg-slate-900">
        <section class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4 backdrop-blur-sm space-y-3.5">
            <div class="flex items-center justify-between">
                <h3 class="text-xs font-bold text-white tracking-wide uppercase text-slate-400">Остатки на складе</h3>
                <button onclick="openWarehouseModal()" class="text-[11px] font-semibold text-amber-400 bg-amber-500/10 px-2.5 py-1 rounded-xl border border-amber-500/20 active:scale-95 transition-all">+ Добавить</button>
            </div>
            <div id="warehouseListContainer" class="space-y-2"></div>
        </section>
    </div>

    <div id="expenseModal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-end justify-center px-4 pb-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4">
            <h3 class="text-sm font-bold text-white border-b border-slate-800 pb-3"><i class="fa-solid fa-wallet text-orange-400"></i> Добавить расход</h3>
            <div class="space-y-3 text-xs">
                <div class="space-y-1">
                    <label class="font-semibold text-slate-400">Сумма (₽) *</label>
                    <input type="number" id="expenseAmount" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="font-semibold text-slate-400">Комментарий / Статья *</label>
                    <input type="text" id="expenseComment" placeholder="Закупка упаковки, Аренда" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeExpenseModal()" class="flex-1 bg-slate-800 py-2.5 rounded-xl text-xs">Отмена</button>
                <button onclick="saveExpense()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 text-slate-900 font-bold py-2.5 rounded-xl text-xs">Добавить</button>
            </div>
        </div>
    </div>

    <div id="warehouseModal" class="fixed inset-0 z-50 hidden modal-backdrop flex items-end justify-center px-4 pb-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4">
            <h3 class="text-sm font-bold text-white border-b border-slate-800 pb-3"><i class="fa-solid fa-box text-amber-400"></i> Ингредиент / Материал</h3>
            <div class="space-y-3 text-xs">
                <div class="space-y-1">
                    <label class="font-semibold text-slate-400">Наименование *</label>
                    <input type="text" id="whName" placeholder="Мука, Петли BLUM" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="font-semibold text-slate-400">Количество *</label>
                        <input type="number" id="whQty" placeholder="1000" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="font-semibold text-slate-400">Ед. измерения *</label>
                        <input type="text" id="whUnit" placeholder="г, шт, м" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="font-semibold text-slate-400">Цена за ед. (₽) *</label>
                    <input type="number" id="whPrice" placeholder="0.5" class="w-full bg-slate-800/50 border border-slate-700/60 rounded-xl px-3.5 py-2.5 text-white focus:outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeWarehouseModal()" class="flex-1 bg-slate-800 py-2.5 rounded-xl text-xs">Отмена</button>
                <button onclick="saveWarehouseItem()" class="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 text-slate-900 font-bold py-2.5 rounded-xl text-xs">Сохранить</button>
            </div>
        </div>
    </div><script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const currentTelegramId = tg?.initDataUnsafe?.user?.id || 999999;
        
        let currentDate = new Date();
        let selectedDateStr = formatDate(currentDate);
        let currentTab = 'calendar';

        // Глобальное состояние приложения
        let state = {
            user: { role: 'baker' }, // По умолчанию кондитер
            orders: [],
            warehouse: [],
            expenses: [],
            templates: {}
        };

        // НАСТРОЙКА АВТОРИЗАЦИИ ДЛЯ ЗАПРОСОВ К БЭКЕНДУ
        const BACKEND_URL = 'http://localhost:3000';
        const initData = tg?.initData || "";

        // Хелпер для сетевых запросов с авторизацией Telegram
        async function apiRequest(endpoint, options = {}) {
            options.headers = {
                ...options.headers,
                'Content-Type': 'application/json',
                'X-Telegram-InitData': initData
            };
            try {
                const response = await fetch(`${BACKEND_URL}${endpoint}`, options);
                if (response.status === 401) {
                    console.error("Ошибка авторизации в Telegram");
                    return null;
                }
                return response;
            } catch (err) {
                console.error("Ошибка сети с бэкендом:", err);
                return null;
            }
        }

        // 1. ЗАГРУЗКА ДАННЫХ ИЗ ОБЛАКА SUPABASE
        async function loadUserData() {
            const response = await apiRequest('/api/orders');
            if (response && response.ok) {
                const ordersFromServer = await response.json();
                
                // Пересобираем плоские структуры из базы под формат отображения фронтенда
                state.orders = ordersFromServer.map(o => ({
                    id: o.id.toString(),
                    date: o.deadline ? o.deadline.split('T')[0] : selectedDateStr,
                    client: o.client_name,
                    product: o.custom_fields?.product_name || "Без названия",
                    price: parseFloat(o.price),
                    prepayment: parseFloat(o.custom_fields?.prepayment || 0)
                }));
            } else {
                console.log("Бэкенд не доступен или пуст, используем базовый режим.");
            }

            // Наполняем локальные данные по складу и рецептам (до переноса их в БД)
            if (!state.warehouse.length) {
                state.warehouse = [
                    { id: "1", name: "Мука пшеничная", qty: 5000, unit: "г", price: 0.06 },
                    { id: "2", name: "Сахар-песок", qty: 3000, unit: "г", price: 0.08 },
                    { id: "3", name: "Яйца куриные", qty: 60, unit: "шт", price: 12 }
                ];
            }
            if (!Object.keys(state.templates).length) {
                state.templates = {
                    "Классический бисквит": [
                        { whItemId: "1", qty: 200 },
                        { whItemId: "2", qty: 150 },
                        { whItemId: "3", qty: 4 }
                    ]
                };
            }

            initApp();
        }

        function initApp() {
            updateRoleBadge();
            renderCalendar();
            renderOrders();
            renderAnalytics();
            renderWarehouse();
            populateTemplatesSelect();
        }

        function updateRoleBadge() {
            const badge = document.getElementById('userRoleBadge');
            if (state.user.role === 'baker') {
                badge.innerText = 'Кондитерская мастерская';
            } else if (state.user.role === 'furniture') {
                badge.innerText = 'Мебельное производство';
            }
        }

        async function selectUserProfileRole(role) {
            state.user.role = role;
            updateRoleBadge();
            populateTemplatesSelect();
            closeMenuModal();

            // Сохраняем выбранную роль на бэкенде
            await apiRequest('/api/user/profile', {
                method: 'POST',
                body: JSON.stringify({ role: role })
            });
        }

        // 2. СОХРАНЕНИЕ НОВОГО ЗАКАЗА В ОБЛАКО
        async function saveOrder() {
            const client = document.getElementById('orderClient').value.trim();
            const product = document.getElementById('orderProduct').value.trim();
            const price = parseFloat(document.getElementById('orderPrice').value) || 0;
            const prepayment = parseFloat(document.getElementById('orderPrepayment').value) || 0;
            const templateKey = document.getElementById('orderTemplateSelect').value;

            if (!client || !product || price <= 0) { alert("Заполните обязательные поля"); return; }

            // Логика списания ресурсов со склада
            if (templateKey && state.templates[templateKey]) {
                state.templates[templateKey].forEach(comp => {
                    const stItem = state.warehouse.find(i => i.id === comp.whItemId);
                    if (stItem) stItem.qty = Math.max(stItem.qty - comp.qty, 0);
                });
            }

            // Структурируем объект под таблицы Supabase
            const orderData = {
                client_name: client,
                price: price,
                expenses: 0,
                status: 'new',
                deadline: `${selectedDateStr}T12:00:00Z`,
                custom_fields: {
                    product_name: product,
                    prepayment: prepayment,
                    recipe_template: templateKey
                }
            };

            const response = await apiRequest('/api/orders', {
                method: 'POST',
                body: JSON.stringify(orderData)
            });

            if (response && response.ok) {
                await loadUserData(); // Полностью обновляем состояние и интерфейс
                closeOrderModal();
            } else {
                alert("Ошибка отправки заказа на бэкенд. Проверьте консоль сервера.");
            }
        }

        // 3. СКАЧИВАНИЕ РЕЗЕРВНОЙ КОПИИ В EXCEL С СЕРВЕРА
        async function exportToExcel() {
            try {
                const response = await apiRequest('/api/backup/export');
                if (!response || !response.ok) throw new Error("Сервер не смог сгенерировать бэкап");

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `MasterApp_Backup_${selectedDateStr}.xlsx`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("Ошибка резервного копирования: " + err.message);
            }
        }

        // ОЧИСТКА ДАННЫХ В ОБЛАКЕ SUPABASE
        async function clearAllData() {
            if (confirm("Вы точно хотите сбросить заказы текущего дня?")) {
                state.orders = state.orders.filter(o => o.date !== selectedDateStr);
                renderOrders();
                renderAnalytics();
                closeMenuModal();
            }
        }

        // КАЛЕНДАРЬ, ИНТЕРФЕЙС И ОТОБРАЖЕНИЕ
        function renderCalendar() {
            const grid = document.getElementById('calendarDatesGrid');
            const monthLabel = document.getElementById('calendarMonthYear');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthsRu = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
            monthLabel.innerText = `${monthsRu[month]} ${year}`;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const shift = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const totalDays = new Date(year, month + 1, 0).getDate();
            
            for(let i=0; i<shift; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            for(let d=1; d<=totalDays; d++) {
                const dayBtn = document.createElement('button');
                dayBtn.innerText = d;
                
                const currentLoopDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                dayBtn.className = "h-9 rounded-xl flex items-center justify-center font-bold text-xs relative transition-all active:scale-95 ";
                
                const isHasOrders = state.orders.some(o => o.date === currentLoopDateStr);
                if (isHasOrders) {
                    const dot = document.createElement('span');
                    dot.className = "absolute bottom-1 w-1 h-1 rounded-full bg-amber-400";
                    dayBtn.appendChild(dot);
                }
                
                if (currentLoopDateStr === selectedDateStr) {
                    dayBtn.className += " bg-gradient-to-tr from-amber-500 to-orange-500 text-slate-900 shadow-lg shadow-orange-500/20";
                } else {
                    dayBtn.className += " bg-slate-800/30 text-slate-300 hover:bg-slate-800/70";
                }
                
                dayBtn.onclick = () => {
                    selectedDateStr = currentLoopDateStr;
                    renderCalendar();
                    renderOrders();
                };
                grid.appendChild(dayBtn);
            }
        }

        function renderOrders() {
            const container = document.getElementById('ordersListContainer');
            const countBadge = document.getElementById('ordersCountBadge');
            container.innerHTML = '';
            
            const dayOrders = state.orders.filter(o => o.date === selectedDateStr);
            countBadge.innerText = dayOrders.length;
            
            if (!dayOrders.length) {
                container.innerHTML = `
                    <div class="text-center py-8 text-slate-500 border border-dashed border-slate-800 rounded-2xl">
                        <i class="fa-solid fa-mug-hot text-xl mb-2 block text-slate-600"></i>
                        <p class="text-xs font-medium">Нет заказов на выбранную дату</p>
                    </div>`;
                return;
            }
            
            dayOrders.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-slate-800/40 border border-slate-800 rounded-2xl p-3.5 flex items-center justify-between backdrop-blur-sm";
                card.innerHTML = `
                    <div class="space-y-1">
                        <h4 class="text-xs font-black text-white">${o.product}</h4>
                        <p class="text-[11px] text-slate-400 flex items-center gap-1"><i class="fa-solid fa-user text-[10px]"></i> ${o.client}</p>
                    </div>
                    <div class="text-right space-y-0.5">
                        <p class="text-xs font-black text-white">${o.price} ₽</p>
                        ${o.prepayment > 0 ? `<p class="text-[9px] px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-400 inline-block font-bold">Предоплата ${o.prepayment} ₽</p>` : ''}
                    </div>`;
                container.appendChild(card);
            });
        }

        function renderAnalytics() {
            const totalRev = state.orders.reduce((sum, o) => sum + o.price, 0);
            const totalPre = state.orders.reduce((sum, o) => sum + o.prepayment, 0);
            
            document.getElementById('financeTotalRevenue').innerText = `${totalRev.toLocaleString()} ₽`;
            document.getElementById('financeTotalPrepayments').innerText = `${totalPre.toLocaleString()} ₽`;
            
            const expContainer = document.getElementById('expensesListContainer');
            expContainer.innerHTML = '';
            if(!state.expenses.length) {
                expContainer.innerHTML = '<p class="text-xs text-slate-500 text-center py-4">Журнал расходов пуст</p>';
                return;
            }
            state.expenses.forEach(e => {
                const div = document.createElement('div');
                div.className = "bg-slate-800/20 border border-slate-800 rounded-xl p-2.5 flex justify-between text-xs";
                div.innerHTML = `<div><p class="text-slate-300 font-semibold">${e.comment}</p><span class="text-[9px] text-slate-500">${e.date}</span></div><p class="font-bold text-rose-400">-${e.amount} ₽</p>`;
                expContainer.appendChild(div);
            });
        }

        function renderWarehouse() {
            const container = document.getElementById('warehouseListContainer');
            container.innerHTML = '';
            state.warehouse.forEach(w => {
                const card = document.createElement('div');
                card.className = "bg-slate-800/30 border border-slate-800 rounded-xl p-3 flex justify-between items-center text-xs";
                card.innerHTML = `<div><p class="text-white font-bold">${w.name}</p><p class="text-[10px] text-slate-500">Цена за ед.: ${w.price} ₽</p></div><div class="text-right"><p class="font-black text-amber-400">${w.qty} ${w.unit}</p></div>`;
                container.appendChild(card);
            });
        }

        function populateTemplatesSelect() {
            const select = document.getElementById('orderTemplateSelect');
            select.innerHTML = '<option value="">Без списания ресурсов</option>';
            if (state.user.role === 'baker') {
                Object.keys(state.templates).forEach(k => {
                    select.innerHTML += `<option value="${k}">${k}</option>`;
                });
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            ['calendar', 'analytics', 'warehouse'].forEach(t => {
                const btn = document.getElementById(`tabBtn-${t}`);
                const view = document.getElementById(`view-${t}`) || document.getElementById('appContainer').querySelector('section:nth-of-type(2)').parentNode;
                
                if(t === tab) {
                    btn.className = "flex flex-col items-center gap-1 text-amber-500 transition-all active:scale-95";
                    btn.querySelector('div').className = "w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center border border-amber-500/20 shadow-lg shadow-amber-500/5";
                    if(t === 'calendar') document.getElementById('appContainer').style.display = 'flex';
                    else {
                        const viewEl = document.getElementById(`view-${t}`);
                        if(viewEl) viewEl.classList.remove('hidden');
                    }
                } else {
                    btn.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-200 transition-all active:scale-95";
                    btn.querySelector('div').className = "w-10 h-10 rounded-xl bg-transparent flex items-center justify-center border border-transparent";
                    if(t === 'calendar' && tab !== 'calendar') document.getElementById('appContainer').style.display = 'none';
                    else {
                        const viewEl = document.getElementById(`view-${t}`);
                        if(viewEl) viewEl.classList.add('hidden');
                    }
                }
            });
            if(tab === 'analytics') renderAnalytics();
            if(tab === 'warehouse') renderWarehouse();
        }

        // РАБОТА С МОДАЛЬНЫМИ ОКНАМИ
        function openOrderModal() { document.getElementById('orderModal').classList.remove('hidden'); }
        function closeOrderModal() { document.getElementById('orderModal').classList.add('hidden'); }
        function openMenuModal() { document.getElementById('menuModal').classList.remove('hidden'); }
        function closeMenuModal() { document.getElementById('menuModal').classList.add('hidden'); }
        function openExpenseModal() { document.getElementById('expenseModal').classList.remove('hidden'); }
        function closeExpenseModal() { document.getElementById('expenseModal').classList.add('hidden'); }
        function openWarehouseModal() { document.getElementById('warehouseModal').classList.remove('hidden'); }
        function closeWarehouseModal() { document.getElementById('warehouseModal').classList.add('hidden'); }

        function saveExpense() {
            const amount = parseFloat(document.getElementById('expenseAmount').value) || 0;
            const comment = document.getElementById('expenseComment').value.trim();
            if(!amount || !comment) return;
            state.expenses.unshift({ id: Date.now().toString(), date: selectedDateStr, amount, comment });
            renderAnalytics();
            closeExpenseModal();
        }

        function saveWarehouseItem() {
            const name = document.getElementById('whName').value.trim();
            const qty = parseFloat(document.getElementById('whQty').value) || 0;
            const unit = document.getElementById('whUnit').value.trim();
            const price = parseFloat(document.getElementById('whPrice').value) || 0;
            if(!name || !qty || !unit || !price) return;
            state.warehouse.push({ id: Date.now().toString(), name, qty, unit, price });
            renderWarehouse();
            closeWarehouseModal();
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Старт приложения при загрузке DOM
        window.addEventListener('DOMContentLoaded', () => {
            loadUserData();
        });
    </script>
</body>
</html>
