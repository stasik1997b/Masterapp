<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MasterApp PRO</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Библиотека XLSX для импорта из Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Телеграм WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-backdrop { background-color: rgba(2, 6, 23, 0.75); backdrop-filter: blur(6px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen flex flex-col justify-between pb-24">

    <!-- ГЛАВНЫЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ -->
    <div class="w-full max-w-md mx-auto p-4 space-y-4 flex-1">
        
        <!-- ВЕРХНЯЯ ПАНЕЛЬ: ПРОФИЛЬ И БАЛАНС -->
        <div class="bg-slate-900 border border-slate-800 p-4 rounded-3xl flex justify-between items-center shadow-lg">
            <div onclick="openProfileModal()" class="flex items-center space-x-3 cursor-pointer group active:scale-98 transition-all">
                <div id="profileAvatar" class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl flex items-center justify-center font-black text-white text-sm shadow-md shadow-indigo-600/10">М</div>
                <div>
                    <div class="flex items-center space-x-1.5">
                        <span id="profileName" class="font-bold text-white text-sm">Мастер</span>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-500 group-hover:text-white transition-colors"></i>
                    </div>
                    <div id="profileSphereBadge" class="inline-flex items-center space-x-1 bg-slate-950 px-2 py-0.5 rounded-md border border-slate-800 text-[9px] font-medium text-slate-400 mt-0.5"></div>
                </div>
            </div>
            
            <div class="text-right">
                <div class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Кошелек</div>
                <div id="walletDisplay" class="text-base font-black text-emerald-400 tracking-tight">0 ₽</div>
            </div>
        </div>

        <!-- ================= СЕКЦИЯ: КАЛЕНДАРЬ И ЗАПИСИ КЛИЕНТОВ ================= -->
        <div id="content-orders" class="space-y-4 content-tab">
            <!-- Виджет календаря -->
            <div class="bg-slate-900 border border-slate-800 p-3.5 rounded-3xl shadow-md space-y-3">
                <div class="flex justify-between items-center px-1">
                    <button onclick="changeMonth(-1)" class="p-1 text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <span id="currentMonthYear" class="font-bold text-xs text-white uppercase tracking-wider"></span>
                    <button onclick="changeMonth(1)" class="p-1 text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                    <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-1 text-center"></div>
            </div>

            <!-- Заголовок блока записей и кнопка добавления -->
            <div class="flex justify-between items-center px-1">
                <h2 class="font-black text-sm text-white tracking-wide">Записи на выбранный день</h2>
                <button onclick="openOrderModal(false)" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 font-bold text-xs text-white rounded-xl shadow-md shadow-indigo-600/10 active:scale-95 transition-all flex items-center space-x-1">
                    <i class="fa-solid fa-plus text-[10px]"></i> <span>Запись</span>
                </button>
            </div>

            <!-- Список клиентов на выбранный день -->
            <div id="ordersList" class="space-y-2.5"></div>
        </div>

        <!-- ================= СЕКЦИЯ: СКЛАД И МАТЕРИАЛЫ ================= -->
        <div id="content-warehouse" class="space-y-3 content-tab hidden">
            <!-- Добавление остатков -->
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-md">
                <div class="grid grid-cols-2 gap-2">
                    <div class="col-span-2">
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Наименование позиции *</label>
                        <input type="text" id="whName" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white focus:outline-none" placeholder="Шоколад, Клей, Дюбеля...">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Ед. измерения</label>
                        <select id="whUnit" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white focus:outline-none">
                            <option value="кг">кг (килограммы)</option>
                            <option value="г">г (граммы)</option>
                            <option value="л">л (литры)</option>
                            <option value="мл">мл (миллилитры)</option>
                            <option value="шт">шт (штуки)</option>
                            <option value="уп">уп (упаковки)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Остаток на складе *</label>
                        <input type="number" step="any" id="whQty" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-center text-white focus:outline-none" placeholder="0">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Цена за 1 единицу (₽) *</label>
                        <input type="number" step="any" id="whPrice" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-center text-white focus:outline-none" placeholder="0">
                    </div>
                </div>
                <button onclick="addWarehouseItem()" class="w-full py-2 bg-slate-950 border border-slate-800 hover:border-indigo-500/30 text-indigo-400 font-bold text-xs rounded-xl transition-all">Добавить на склад</button>
            </div>

            <!-- Сводный список позиций на складе -->
            <div id="warehouseList" class="space-y-2"></div>
        </div>

        <!-- ================= СЕКЦИЯ: УМНЫЙ КАЛЬКУЛЯТОР СЕБЕСТОИМОСТИ ================= -->
        <div id="content-calc" class="space-y-3 content-tab hidden">
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl space-y-2 shadow-md">
                <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-1">Сохраненные шаблоны</div>
                <div id="templatesList" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto no-scrollbar"></div>
            </div>

            <div id="calcItemsContainer" class="space-y-2"></div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="addCalcItemRow()" class="py-2.5 bg-slate-900 border border-slate-800 hover:border-indigo-500/30 font-bold text-xs text-indigo-400 rounded-xl transition-all flex items-center justify-center space-x-1">
                    <i class="fa-solid fa-plus text-[10px]"></i> <span>Компонент</span>
                </button>
                <button onclick="clearCalculator()" class="py-2.5 bg-slate-900 border border-slate-800 hover:border-rose-500/30 font-bold text-xs text-rose-400 rounded-xl transition-all flex items-center justify-center space-x-1">
                    <i class="fa-solid fa-broom text-[10px]"></i> <span>Очистить</span>
                </button>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-md">
                <div class="flex justify-between items-center border-b border-slate-800/60 pb-2">
                    <span class="text-xs text-slate-400">Себестоимость:</span>
                    <span id="totalCalcCost" class="text-sm font-black text-white">0 ₽</span>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Желаемая наценка (%)</label>
                    <input type="number" id="calcMargin" oninput="calculateRecipe()" value="100" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-center text-white focus:outline-none">
                </div>
                <div class="flex justify-between items-center bg-indigo-600/10 border border-indigo-500/20 p-2.5 rounded-xl">
                    <span class="text-xs text-indigo-400 font-medium">Рекомендуемая цена:</span>
                    <span id="recommendedPrice" class="text-base font-black text-indigo-300">0 ₽</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button onclick="saveCurrentAsTemplate()" class="py-2 bg-slate-950 border border-slate-800 text-slate-300 hover:text-white font-bold text-[11px] rounded-xl transition-all">Новый шаблон</button>
                    <button onclick="updateCurrentTemplate()" id="updateTemplateBtn" class="py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[11px] rounded-xl hidden transition-all">Обновить текущий</button>
                </div>
            </div>
        </div>

        <!-- ================= СЕКЦИЯ: ФИНАНСОВЫЕ ОТЧЕТЫ И СИНХРОНИЗАЦИЯ ================= -->
        <div id="content-reports" class="space-y-3 content-tab hidden">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-md">
                <h3 class="font-bold text-white text-sm">Генерация отчета</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Дата С</label>
                        <input type="date" id="reportDateFrom" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white focus:outline-none text-center">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Дата По</label>
                        <input type="date" id="reportDateTo" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white focus:outline-none text-center">
                    </div>
                </div>
                <button onclick="generateReport()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 font-bold text-xs text-white rounded-xl active:scale-[0.99] transition-all">Сформировать отчет</button>
            </div>

            <div id="reportResultCard" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-md hidden">
                <div id="reportFinanceGrid" class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-950 border border-slate-800 p-2 rounded-xl">
                        <div class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Выручка</div>
                        <div id="repRevenue" class="text-xs font-black text-emerald-400 mt-0.5">0 ₽</div>
                    </div>
                    <div id="reportExpenseBlock" class="bg-slate-950 border border-slate-800 p-2 rounded-xl">
                        <div class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Расходы</div>
                        <div id="repExpenses" class="text-xs font-black text-rose-400 mt-0.5">0 ₽</div>
                    </div>
                    <div id="reportProfitBlock" class="bg-slate-950 border border-slate-800 p-2 rounded-xl">
                        <div class="text-[9px] uppercase tracking-wider text-slate-500 font-bold">Прибыль</div>
                        <div id="repProfit" class="text-xs font-black text-indigo-400 mt-0.5">0 ₽</div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-md">
                <h3 class="font-bold text-white text-sm">Данные и Синхронизация</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportToExcel()" class="py-2.5 bg-slate-950 border border-slate-800 hover:border-emerald-500/20 text-emerald-400 font-bold text-xs rounded-xl transition-all flex items-center justify-center space-x-1.5">
                        <i class="fa-solid fa-file-excel"></i> <span>Бэкап в бот</span>
                    </button>
                    <label class="py-2.5 bg-slate-950 border border-slate-800 hover:border-indigo-500/20 text-indigo-400 font-bold text-xs rounded-xl transition-all flex items-center justify-center space-x-1.5 cursor-pointer text-center">
                        <i class="fa-solid fa-file-import"></i> <span>Из Excel</span>
                        <input type="file" id="importFile" accept=".xlsx" onchange="restoreFromExcel(event)" class="hidden">
                    </label>
                </div>
                
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button onclick="openExpenseModal()" id="directExpenseBtn" class="py-2 bg-slate-950 border border-slate-800 text-slate-300 hover:text-white font-bold text-[11px] rounded-xl transition-all flex items-center justify-center space-x-1">
                        <i class="fa-solid fa-wallet text-[9px] text-rose-400"></i> <span>Внести расход</span>
                    </button>
                    <button onclick="clearAllData()" class="py-2 bg-slate-950 border border-slate-800 hover:bg-rose-950/20 text-slate-500 hover:text-rose-400 font-bold text-[11px] rounded-xl transition-all flex items-center justify-center space-x-1">
                        <i class="fa-solid fa-trash-can text-[9px]"></i> <span>Сброс данных</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= ФИКСИРОВАННАЯ НИЖНЯЯ НАВИГАЦИЯ ================= -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-900 px-4 py-2 flex justify-between items-center z-40 max-w-md mx-auto shadow-2xl safe-bottom">
        <button id="tab-orders" onclick="switchTab('orders')" class="flex flex-col items-center space-y-1 py-1.5 px-3 rounded-xl transition-all text-white bg-slate-900 border border-slate-800 shadow-sm">
            <i class="fa-solid fa-calendar-days text-sm"></i>
            <span class="text-[9px] font-bold">Записи</span>
        </button>
        <button id="tab-warehouse" onclick="switchTab('warehouse')" class="flex flex-col items-center space-y-1 py-1.5 px-3 rounded-xl transition-all text-slate-400">
            <i class="fa-solid fa-boxes-stacked text-sm"></i>
            <span id="warehouseTabLabel" class="text-[9px] font-bold">Склад</span>
        </button>
        <button id="tab-calc" onclick="switchTab('calc')" class="flex flex-col items-center space-y-1 py-1.5 px-3 rounded-xl transition-all text-slate-400">
            <i class="fa-solid fa-calculator text-sm"></i>
            <span id="calcTabLabel" class="text-[9px] font-bold">Рецепты</span>
        </button>
        <button id="tab-reports" onclick="switchTab('reports')" class="flex flex-col items-center space-y-1 py-1.5 px-3 rounded-xl transition-all text-slate-400">
            <i class="fa-solid fa-chart-pie text-sm"></i>
            <span class="text-[9px] font-bold">Отчеты</span>
        </button>
    </nav>

    <!-- МОДАЛКА ПРОФИЛЯ -->
    <div id="profileModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop hidden">
        <div class="bg-slate-950 border border-slate-800 rounded-3xl w-full max-w-sm p-6 text-center space-y-4 shadow-2xl">
            <div class="flex justify-end">
                <button onclick="closeProfileModal()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl flex items-center justify-center shadow-lg mx-auto">
                <span id="modalAvatar" class="font-bold text-white text-2xl">M</span>
            </div>
            <div>
                <h3 id="modalName" class="font-bold text-white text-lg">Мастер</h3>
                <p id="modalUsername" class="text-xs text-indigo-400">@username</p>
            </div>
            
            <div class="border-t border-slate-800 pt-4 text-left space-y-3">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Имя мастера</label>
                    <input type="text" id="profNameInput" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2 text-sm text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Сфера деятельности</label>
                    <select id="profSphereSelect" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2 text-sm text-white focus:outline-none">
                        <option value="culinary">Кулинар / Кондитер</option>
                        <option value="beauty">Бьюти-мастер</option>
                        <option value="handyman">Муж на час</option>
                    </select>
                </div>
                <button onclick="saveProfile()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-xs transition-all">Сохранить профиль</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ЗАПИСИ КЛИЕНТА -->
    <div id="orderModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop hidden">
        <div class="bg-slate-950 border border-slate-800 rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center">
                <h3 id="orderModalTitle" class="font-bold text-white text-lg">Новая запись</h3>
                <button onclick="closeOrderModal()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <input type="hidden" id="orderId" value="">
            
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Клиент *</label>
                    <input type="text" id="orderClient" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none" placeholder="Имя клиента">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Время *</label>
                        <input type="time" id="orderTime" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white text-center focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Телефон</label>
                        <input type="tel" id="orderPhone" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none" placeholder="+7...">
                    </div>
                </div>

                <!-- УМНОЕ ПОЛЕ АДРЕСА -->
                <div id="addressFieldContainer" class="hidden">
                    <label class="block text-[10px] text-indigo-400 uppercase tracking-wider mb-1">Адрес объекта *</label>
                    <input type="text" id="orderAddress" class="w-full bg-slate-900 border border-indigo-950/40 rounded-xl p-2.5 text-sm text-white focus:outline-none placeholder-slate-600" placeholder="Улица, дом, кв">
                </div>

                <div>
                    <label id="orderProductLabel" class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Наименование услуги *</label>
                    <input type="text" id="orderProduct" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none" placeholder="Что делаем">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Стоимость (₽) *</label>
                        <input type="number" id="orderPrice" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white text-center focus:outline-none" placeholder="0">
                    </div>
                    <div id="orderPrepaymentBlock">
                        <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Предоплата (₽)</label>
                        <input type="number" id="orderPrepayment" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white text-center focus:outline-none" placeholder="0">
                    </div>
                </div>

                <div id="orderTemplateBlock">
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Автосписание по шаблону</label>
                    <select id="orderTemplateSelect" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
                        <option value="">-- Без шаблона (ручной учет) --</option>
                    </select>
                </div>
                
                <button onclick="saveOrder()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm shadow-lg shadow-indigo-600/20 transition-all">Сохранить запись</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА РАСХОДА -->
    <div id="expenseModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop hidden">
        <div class="bg-slate-950 border border-slate-800 rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-white text-lg">Прямой расход</h3>
                <button onclick="closeExpenseModal()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Сумма расхода (₽) *</label>
                    <input type="number" id="expAmount" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white text-center focus:outline-none" placeholder="0">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase tracking-wider mb-1">Назначение / Комментарий *</label>
                    <input type="text" id="expComment" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none" placeholder="Например: Аренда, реклама, инструмент">
                </div>
                <button onclick="saveExpense()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition-all">Зафиксировать расход</button>
            </div>
        </div>
    </div>

    <!-- СКРИПТЫ ЛОГИКИ ПРИЛОЖЕНИЯ -->
    <script>
        // Инициализация Telegram WebApp API
        let tgUserId = "local_user";
        let tgUsername = "@unknown_master";
        let currentTelegramId = "123456"; // Дефолтный ID для тестов в браузере

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (user) {
                currentTelegramId = user.id.toString();
                tgUserId = user.id.toString();
                tgUsername = user.username ? `@${user.username}` : `id:${user.id}`;
                
                // Первичная подстановка имени из ТГ, если в базе еще пусто
                if (!localStorage.getItem(`masterapp_name_${currentTelegramId}`)) {
                    localStorage.setItem(`masterapp_name_${currentTelegramId}`, user.first_name || "Мастер");
                }
            }
        }

        let currentDate = new Date();
        let selectedDateStr = formatDate(new Date());
        let activeTemplateName = "";

        // СТРУКТУРА ЕДИНОГО СОСТОЯНИЯ ПРИЛОЖЕНИЯ
        let state = {
            sphere: 'culinary',
            warehouse: [],
            templates: {},
            orders: [],
            expenses: []
        };

        function getStorageKey() {
            return `masterapp_db_user_${currentTelegramId}`;
        }

        // Загрузка данных
        function loadUserData() {
            const key = getStorageKey();
            const raw = localStorage.getItem(key);
            
            // Загружаем сохраненную сферу или ставим дефолтную
            const savedSphere = localStorage.getItem(`masterapp_sphere_${currentTelegramId}`);
            
            if (raw) {
                try {
                    state = JSON.parse(raw);
                    if (!state.warehouse) state.warehouse = [];
                    if (!state.templates) state.templates = {};
                    if (!state.orders) state.orders = [];
                    if (!state.expenses) state.expenses = [];
                    if (savedSphere) state.sphere = savedSphere;
                } catch (e) {
                    console.error("Ошибка парсинга БД", e);
                }
            } else {
                state.sphere = savedSphere || 'culinary';
                generateDemoDataForSphere(state.sphere);
            }
            
            // Отрисовка имени профиля
            const storedName = localStorage.getItem(`masterapp_name_${currentTelegramId}`) || "Мастер";
            document.getElementById('profileName').textContent = storedName;
            document.getElementById('profileAvatar').textContent = storedName.charAt(0).toUpperCase();
            document.getElementById('modalUsername').textContent = tgUsername;
            
            applySphereSettings();
        }

        function saveUserData() {
            localStorage.setItem(getStorageKey(), JSON.stringify(state));
            localStorage.setItem(`masterapp_sphere_${currentTelegramId}`, state.sphere);
            localStorage.setItem(`masterapp_name_${currentTelegramId}`, document.getElementById('profileName').textContent);
            calculateWallet();
        }

        // ЖЕСТКОЕ РАЗГРАНИЧЕНИЕ ИЗОЛИРОВАННЫХ УЧЁТОК И ТАБОВ ПО СФЕРАМ
        function applySphereSettings() {
            const labelWh = document.getElementById('warehouseTabLabel');
            const labelCalc = document.getElementById('calcTabLabel');
            const prepayBlock = document.getElementById('orderPrepaymentBlock');
            const templateBlock = document.getElementById('orderTemplateBlock');
            const badge = document.getElementById('profileSphereBadge');
            const addressField = document.getElementById('addressFieldContainer');
            const orderProductLabel = document.getElementById('orderProductLabel');
            const directExpenseBtn = document.getElementById('directExpenseBtn');

            // Кнопки навигационной панели
            const tabWarehouseBtn = document.getElementById('tab-warehouse');
            const tabCalcBtn = document.getElementById('tab-calc');

            addressField.classList.add('hidden');

            if (state.sphere === 'culinary') {
                tabWarehouseBtn.classList.remove('hidden');
                tabCalcBtn.classList.remove('hidden');
                labelWh.textContent = "Склад";
                labelCalc.textContent = "Рецепты";
                prepayBlock.classList.remove('hidden');
                templateBlock.classList.remove('hidden');
                badge.innerHTML = `<i class="fa-solid fa-cake-candles text-[9px] text-amber-400"></i> <span>Кондитер / Кулинар</span>`;
                orderProductLabel.textContent = "Наименование изделия *";
                if(directExpenseBtn) directExpenseBtn.classList.remove('hidden');
            } else if (state.sphere === 'beauty') {
                tabWarehouseBtn.classList.add('hidden'); // У бьюти скрыта вкладка склад материалов по ТЗ
                tabCalcBtn.classList.remove('hidden');   // Но открыты техкарты
                labelCalc.textContent = "Техкарты";
                prepayBlock.classList.remove('hidden');
                templateBlock.classList.remove('hidden');
                badge.innerHTML = `<i class="fa-solid fa-sparkles text-[9px] text-fuchsia-400"></i> <span>Бьюти-мастер</span>`;
                orderProductLabel.textContent = "Наименование услуги *";
                if(directExpenseBtn) directExpenseBtn.classList.remove('hidden');
            } else if (state.sphere === 'handyman') {
                tabWarehouseBtn.classList.add('hidden'); // У мужа на час скрыт склад
                tabCalcBtn.classList.add('hidden');      // У мужа на час скрыты рецепты/сметы из навигации
                prepayBlock.classList.add('hidden');
                templateBlock.classList.add('hidden');
                badge.innerHTML = `<i class="fa-solid fa-screwdriver-wrench text-[9px] text-orange-400"></i> <span>Муж на час</span>`;
                orderProductLabel.textContent = "Описание работ *";
                addressField.classList.remove('hidden');
                if(directExpenseBtn) directExpenseBtn.classList.add('hidden');
            }

            // Очищаем и заново заполняем селектор шаблонов в модалке
            const select = document.getElementById('orderTemplateSelect');
            if (select) {
                select.innerHTML = '<option value="">-- Без шаблона (ручной учет) --</option>';
                Object.keys(state.templates).forEach(name => {
                    select.innerHTML += `<option value="${name}">${name}</option>`;
                });
            }

            // Корректный сброс активного таба, если текущий был скрыт новой сферой
            switchTab('orders');
            renderCalendar();
            renderOrders();
            renderWarehouse();
            updateTemplateUiElements();
            calculateWallet();
        }

        function generateDemoDataForSphere(sphereType) {
            state.warehouse = [];
            state.templates = {};
            state.orders = [];
            state.expenses = [];

            if (sphereType === 'culinary') {
                state.warehouse = [
                    { id: "wh_1", name: "Бельгийский шоколад", qty: 5.5, unit: "кг", price: 1200 },
                    { id: "wh_2", name: "Сливки 33%", qty: 12, unit: "л", price: 350 },
                    { id: "wh_3", name: "Творожный сыр", qty: 8, unit: "кг", price: 450 }
                ];
                state.templates["Бенто-торт Классик"] = [
                    { isCustom: false, whItemId: "wh_2", customName: "", qty: 0.3, customPrice: 0 },
                    { isCustom: false, whItemId: "wh_3", customName: "", qty: 0.4, customPrice: 0 },
                    { isCustom: true, whItemId: "", customName: "Упаковка и лента", qty: 1, customPrice: 80 }
                ];
            } else if (sphereType === 'beauty') {
                state.warehouse = [
                    { id: "wh_1", name: "Ресницы MIX C 0.07", qty: 4, unit: "шт", price: 850 },
                    { id: "wh_2", name: "Клей Neo Экстра", qty: 2, unit: "шт", price: 900 }
                ];
                state.templates["Наращивание 2D"] = [
                    { isCustom: false, whItemId: "wh_1", customName: "", qty: 1, customPrice: 0 },
                    { isCustom: true, whItemId: "", customName: "Расходники", qty: 1, customPrice: 50 }
                ];
            }
            // Для handyman оставляем базу чистой под ручной ввод
        }

        function calculateWallet() {
            let totalIncome = 0;
            state.orders.forEach(o => {
                if (o.status === 'completed') {
                    totalIncome += (parseFloat(o.price) || 0);
                }
            });

            let totalExp = 0;
            if (state.sphere !== 'handyman') {
                state.expenses.forEach(e => { totalExp += (parseFloat(e.amount) || 0); });
            }

            const wallet = totalIncome - totalExp;
            document.getElementById('walletDisplay').textContent = `${Math.round(wallet).toLocaleString()} ₽`;
        }

        // НАВИГАЦИЯ ВНИЗУ — ИСПРАВЛЕНЫ СТИЛИ И ПЕРЕКЛЮЧЕНИЯ
        function switchTab(tabName) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tabName}`).classList.remove('hidden');

            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-white', 'bg-slate-900', 'border', 'border-slate-800', 'shadow-sm');
                btn.classList.add('text-slate-400');
            });

            const activeBtn = document.getElementById(`tab-${tabName}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('text-white', 'bg-slate-900', 'border', 'border-slate-800', 'shadow-sm');
            }

            if(tabName === 'reports') generateReport();
        }

        // МЕНЕДЖЕР СКЛАДА
        function renderWarehouse() {
            const list = document.getElementById('warehouseList');
            if(!list) return;
            list.innerHTML = '';

            if (state.warehouse.length === 0) {
                list.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">Склад пуст</div>`;
                return;
            }

            state.warehouse.forEach(item => {
                const row = document.createElement('div');
                row.className = "bg-slate-900 border border-slate-800 p-3 rounded-xl flex justify-between items-center shadow-sm";
                row.innerHTML = `
                    <div>
                        <div class="font-bold text-white text-xs">📦 ${item.name}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">Остаток: <span class="text-indigo-400 font-bold">${item.qty} ${item.unit}</span> · Цена: ${item.price} ₽/${item.unit}</div>
                    </div>
                    <button onclick="deleteWarehouseItem('${item.id}')" class="text-slate-600 hover:text-rose-400 p-1.5 transition-all"><i class="fa-solid fa-trash-can text-xs"></i></button>
                `;
                list.appendChild(row);
            });
        }

        function addWarehouseItem() {
            const name = document.getElementById('whName').value.trim();
            const unit = document.getElementById('whUnit').value;
            const qty = parseFloat(document.getElementById('whQty').value) || 0;
            const price = parseFloat(document.getElementById('whPrice').value) || 0;

            if(!name || qty <= 0 || price <= 0) { alert("Заполните все поля корректно!"); return; }

            state.warehouse.push({ id: "wh_" + Date.now(), name, unit, qty, price });
            saveUserData();
            renderWarehouse();
            applySphereSettings();

            document.getElementById('whName').value = '';
            document.getElementById('whQty').value = '';
            document.getElementById('whPrice').value = '';
        }

        function deleteWarehouseItem(id) {
            state.warehouse = state.warehouse.filter(i => i.id !== id);
            saveUserData();
            renderWarehouse();
            applySphereSettings();
        }

        function updateTemplateUiElements() {
            const container = document.getElementById('templatesList');
            if(!container) return;
            container.innerHTML = '';
            
            Object.keys(state.templates).forEach(name => {
                const btn = document.createElement('button');
                btn.textContent = name;
                btn.className = `px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all border ${activeTemplateName === name ? 'bg-indigo-600 text-white border-indigo-500 shadow-md shadow-indigo-600/10' : 'bg-slate-950 border-slate-800 text-slate-400 hover:text-white hover:border-slate-700'}`;
                btn.onclick = () => loadSelectedTemplate(name);
                container.appendChild(btn);
            });
        }

        // ДВИЖОК РАСЧЕТА КАЛЬКУЛЯТОРА
        function addCalcItemRow(whItemId = "", qty = "", isCustom = false, customName = "", customPrice = "") {
            const container = document.getElementById('calcItemsContainer');
            if(!container) return;
            const rowId = "row_" + Math.random().toString(36).substr(2, 9);
            const row = document.createElement('div');
            row.className = "bg-slate-900 border border-slate-800 p-3 rounded-xl space-y-2 relative shadow-sm";
            row.id = rowId;

            let selectOptions = `<option value="">-- Кастомный расход (вручную) --</option>`;
            state.warehouse.forEach(i => {
                selectOptions += `<option value="${i.id}" ${i.id === whItemId ? 'selected' : ''}>${i.name} (${i.price}₽/${i.unit})</option>`;
            });

            row.innerHTML = `
                <div class="grid grid-cols-12 gap-1.5 items-center">
                    <div class="col-span-11">
                        <select onchange="toggleCalcRowMode('${rowId}')" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-white focus:outline-none row-select">
                            ${selectOptions}
                        </select>
                    </div>
                    <div class="col-span-1 text-right">
                        <button onclick="document.getElementById('${rowId}').remove(); calculateRecipe();" class="text-slate-600 hover:text-rose-400 transition-all"><i class="fa-solid fa-circle-minus text-xs"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-12 gap-1.5 row-inputs-block"></div>
            `;
            container.appendChild(row);
            toggleCalcRowMode(rowId, isCustom, customName, customPrice, qty);
            calculateRecipe();
        }

        function toggleCalcRowMode(rowId, isCustomOverride = null, cName = "", cPrice = "", qtyVal = "") {
            const row = document.getElementById(rowId);
            if(!row) return;
            const select = row.querySelector('.row-select');
            const inputsBlock = row.querySelector('.row-inputs-block');
            
            const isCustom = isCustomOverride !== null ? isCustomOverride : (select.value === "");
            inputsBlock.innerHTML = '';

            if (isCustom) {
                if(isCustomOverride === null) select.value = "";
                inputsBlock.innerHTML = `
                    <div class="col-span-7">
                        <input type="text" placeholder="Название расхода" value="${cName}" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-white focus:outline-none input-custom-name" oninput="calculateRecipe()">
                    </div>
                    <div class="col-span-5">
                        <input type="number" placeholder="Цена (₽)" value="${cPrice}" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-center text-white focus:outline-none input-custom-price" oninput="calculateRecipe()">
                    </div>
                `;
            } else {
                const whItem = state.warehouse.find(i => i.id === select.value);
                const unit = whItem ? whItem.unit : "ед";
                inputsBlock.innerHTML = `
                    <div class="col-span-7 text-xs text-slate-400 flex items-center px-1">Фиксированный расход:</div>
                    <div class="col-span-5 flex items-center space-x-1">
                        <input type="number" placeholder="Кол-во" value="${qtyVal}" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-center text-white focus:outline-none input-qty" oninput="calculateRecipe()">
                        <span class="text-[11px] text-slate-500 font-bold w-6 text-left">${unit}</span>
                    </div>
                `;
            }
        }

        function calculateRecipe() {
            let totalCost = 0;
            const container = document.getElementById('calcItemsContainer');
            if(!container) return;

            container.querySelectorAll(':scope > div').forEach(row => {
                const select = row.querySelector('.row-select');
                if(!select) return;

                if (select.value === "") {
                    const priceInp = row.querySelector('.input-custom-price');
                    totalCost += parseFloat(priceInp?.value) || 0;
                } else {
                    const whItem = state.warehouse.find(i => i.id === select.value);
                    const qtyInp = row.querySelector('.input-qty');
                    const qty = parseFloat(qtyInp?.value) || 0;
                    if (whItem) totalCost += (whItem.price * qty);
                }
            });

            document.getElementById('totalCalcCost').textContent = `${Math.round(totalCost).toLocaleString()} ₽`;
            const margin = parseFloat(document.getElementById('calcMargin').value) || 0;
            document.getElementById('recommendedPrice').textContent = `${Math.round(totalCost * (1 + margin / 100)).toLocaleString()} ₽`;
        }

        function loadSelectedTemplate(name) {
            activeTemplateName = name;
            document.getElementById('calcItemsContainer').innerHTML = '';
            document.getElementById('updateTemplateBtn').classList.remove('hidden');

            const items = state.templates[name] || [];
            items.forEach(it => {
                addCalcItemRow(it.whItemId, it.qty, it.isCustom, it.customName, it.customPrice);
            });
            updateTemplateUiElements();
        }

        function clearCalculator() {
            activeTemplateName = "";
            document.getElementById('calcItemsContainer').innerHTML = '';
            document.getElementById('updateTemplateBtn').classList.add('hidden');
            calculateRecipe();
            updateTemplateUiElements();
        }

        function saveCurrentAsTemplate() {
            const name = prompt("Введите имя нового шаблона:");
            if(!name || !name.trim()) return;
            activeTemplateName = name.trim();
            confirmSaveTemplate();
        }

        function updateCurrentTemplate() {
            if(!activeTemplateName) return;
            confirmSaveTemplate();
        }

        function confirmSaveTemplate() {
            const container = document.getElementById('calcItemsContainer');
            const items = [];

            container.querySelectorAll(':scope > div').forEach(row => {
                const select = row.querySelector('.row-select');
                if(!select) return;

                if (select.value === "") {
                    items.push({
                        isCustom: true,
                        whItemId: "",
                        customName: row.querySelector('.input-custom-name')?.value || "Расход",
                        customPrice: parseFloat(row.querySelector('.input-custom-price')?.value) || 0,
                        qty: 1
                    });
                } else {
                    items.push({
                        isCustom: false,
                        whItemId: select.value,
                        customName: "",
                        customPrice: 0,
                        qty: parseFloat(row.querySelector('.input-qty')?.value) || 0
                    });
                }
            });

            state.templates[activeTemplateName] = items;
            saveUserData();
            applySphereSettings();
            alert(`Шаблон "${activeTemplateName}" сохранен!`);
        }

        // КАЛЕНДАРЬ И ОТОБРАЖЕНИЕ ЗАПИСЕЙ
        function renderCalendar() {
            const daysContainer = document.getElementById('calendarDays');
            if(!daysContainer) return;
            daysContainer.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            document.getElementById('currentMonthYear').textContent = `${monthNames[month]} ${year}`;

            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7;
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const blank = document.createElement('div');
                blank.className = "text-slate-700 p-2 text-xs opacity-20";
                daysContainer.appendChild(blank);
            }

            for (let day = 1; day <= totalDays; day++) {
                const cellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = `p-2 text-xs rounded-xl flex flex-col items-center justify-between min-h-[42px] cursor-pointer transition-all border active:scale-95 relative ${
                    cellDateStr === selectedDateStr 
                    ? "bg-indigo-600 border-indigo-500 text-white font-bold shadow-md shadow-indigo-600/20" 
                    : "bg-slate-950 border-slate-800/60 text-slate-300 hover:border-slate-700"
                }`;

                const dayLabel = document.createElement('span');
                dayLabel.textContent = day;
                cell.appendChild(dayLabel);

                const dayOrders = state.orders.filter(o => o.date === cellDateStr);
                if (dayOrders.length > 0) {
                    const dot = document.createElement('span');
                    const hasPending = dayOrders.some(o => o.status === 'pending');
                    dot.className = `w-1.5 h-1.5 rounded-full absolute bottom-1.5 ${hasPending ? 'bg-indigo-400' : 'bg-emerald-400'}`;
                    cell.appendChild(dot);
                }

                cell.onclick = () => {
                    selectedDateStr = cellDateStr;
                    renderCalendar();
                    renderOrders();
                };
                daysContainer.appendChild(cell);
            }
        }

        function renderOrders() {
            const list = document.getElementById('ordersList');
            if(!list) return;
            list.innerHTML = '';

            const dayOrders = state.orders.filter(o => o.date === selectedDateStr);
            if (dayOrders.length === 0) {
                list.innerHTML = `<div class="text-center py-8 text-slate-500 text-xs">Нет записей на выбранную дату</div>`;
                return;
            }

            dayOrders.sort((a, b) => a.time.localeCompare(b.time));

            dayOrders.forEach(order => {
                const card = document.createElement('div');
                const isCompleted = order.status === 'completed';
                
                card.className = `border p-3.5 rounded-2xl flex flex-col space-y-3 shadow-sm transition-all ${
                    isCompleted ? 'bg-slate-900/40 border-slate-900 text-slate-400' : 'bg-slate-900 border-slate-800 text-slate-100'
                }`;

                let addressHtml = "";
                if (state.sphere === 'handyman' && order.address) {
                    addressHtml = `
                        <div class="text-[11px] text-indigo-400 flex items-start space-x-1 bg-slate-950/40 border border-indigo-950/30 p-1.5 rounded-lg mt-1">
                            <i class="fa-solid fa-location-dot mt-0.5 text-[10px]"></i>
                            <span>${order.address}</span>
                        </div>
                    `;
                }

                const completeBtnHtml = isCompleted 
                    ? `<button class="p-2 bg-slate-950 border border-slate-800 text-slate-600 rounded-xl cursor-not-allowed"><i class="fa-solid fa-check text-xs"></i></button>`
                    : `<button onclick="completeOrder('${order.id}')" class="p-2 bg-slate-950 border border-slate-800 text-emerald-400 hover:border-emerald-500/30 rounded-xl transition-all"><i class="fa-solid fa-check text-xs font-bold"></i></button>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="space-y-1 max-w-[70%]">
                            <div class="text-xs font-black tracking-wide flex items-center space-x-2">
                                <span class="px-1.5 py-0.5 bg-slate-950 border border-slate-800 rounded-md text-[10px] text-indigo-400 font-mono">${order.time}</span>
                                <span class="${isCompleted ? 'line-through text-slate-500' : 'text-white'}">${order.client}</span>
                            </div>
                            <div class="text-[11px] text-slate-400 font-medium">${order.product}</div>
                            ${addressHtml}
                            ${order.phone ? `<div class="text-[10px] text-slate-500 mt-1"><i class="fa-solid fa-phone text-[9px]"></i> ${order.phone}</div>` : ''}
                        </div>
                        <div class="text-right space-y-1">
                            <div class="text-xs font-black ${isCompleted ? 'text-slate-500' : 'text-emerald-400'}">${order.price} ₽</div>
                            ${order.prepayment ? `<div class="text-[9px] text-slate-500">Предоплата: ${order.prepayment} ₽</div>` : ''}
                            ${isCompleted ? `<span class="inline-block text-[9px] font-bold text-emerald-500/80 bg-emerald-500/10 border border-emerald-500/20 px-1.5 py-0.5 rounded-md uppercase tracking-wider">Выполнено</span>` : ''}
                        </div>
                    </div>
                    <div class="flex justify-end space-x-1.5 border-t border-slate-800/50 pt-2">
                        ${completeBtnHtml}
                        <button onclick="editOrder('${order.id}')" class="p-2 bg-slate-950 border border-slate-800 text-amber-400 hover:border-amber-500/30 rounded-xl transition-all"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="deleteOrder('${order.id}')" class="p-2 bg-slate-950 border border-slate-800 text-slate-500 hover:text-rose-400 rounded-xl transition-all"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function completeOrder(id) {
            const order = state.orders.find(o => o.id === id);
            if (!order) return;

            order.status = 'completed';

            if (order.templateName && state.sphere !== 'handyman' && state.templates[order.templateName]) {
                state.templates[order.templateName].forEach(it => {
                    if (!it.isCustom && it.whItemId) {
                        const whItem = state.warehouse.find(w => w.id === it.whItemId);
                        if (whItem) whItem.qty = Math.max(0, whItem.qty - (parseFloat(it.qty) || 0));
                    }
                });
            }

            saveUserData();
            renderCalendar();
            renderOrders();
            renderWarehouse();
            autoSyncWithServer();
        }

        function openOrderModal(isEditMode = false) {
            if (!isEditMode) {
                document.getElementById('orderId').value = '';
                document.getElementById('orderModalTitle').textContent = "Новая запись";
                document.getElementById('orderClient').value = '';
                document.getElementById('orderTime').value = new Date().toTimeString().substr(0, 5);
                document.getElementById('orderPhone').value = '';
                document.getElementById('orderAddress').value = '';
                document.getElementById('orderProduct').value = '';
                document.getElementById('orderPrice').value = '';
                document.getElementById('orderPrepayment').value = '';
                document.getElementById('orderTemplateSelect').value = '';
            }
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function editOrder(id) {
            const order = state.orders.find(o => o.id === id);
            if (!order) return;

            document.getElementById('orderId').value = order.id;
            document.getElementById('orderModalTitle').textContent = "Правка записи";
            document.getElementById('orderClient').value = order.client || '';
            document.getElementById('orderTime').value = order.time || '';
            document.getElementById('orderPhone').value = order.phone || '';
            document.getElementById('orderProduct').value = order.product || '';
            document.getElementById('orderPrice').value = order.price || '';
            document.getElementById('orderPrepayment').value = order.prepayment || '';
            document.getElementById('orderTemplateSelect').value = order.templateName || '';
            
            if (state.sphere === 'handyman') {
                document.getElementById('orderAddress').value = order.address || '';
            }

            openOrderModal(true);
        }

        function saveOrder() {
            const id = document.getElementById('orderId').value;
            const client = document.getElementById('orderClient').value.trim();
            const time = document.getElementById('orderTime').value;
            const phone = document.getElementById('orderPhone').value.trim();
            const product = document.getElementById('orderProduct').value.trim();
            const price = parseFloat(document.getElementById('orderPrice').value) || 0;
            const prepayment = parseFloat(document.getElementById('orderPrepayment').value) || 0;
            const templateName = document.getElementById('orderTemplateSelect').value;
            const address = document.getElementById('orderAddress').value.trim();

            if (!client || !time || !product || price <= 0) {
                alert("Пожалуйста, заполните обязательные поля и цену!");
                return;
            }

            if (state.sphere === 'handyman' && !address) {
                alert("Для Мужа на час адрес обязателен!");
                return;
            }

            if (id) {
                const order = state.orders.find(o => o.id === id);
                if (order) {
                    order.client = client;
                    order.time = time;
                    order.phone = phone;
                    order.product = product;
                    order.price = price;
                    order.prepayment = state.sphere === 'handyman' ? 0 : prepayment;
                    order.templateName = templateName;
                    order.address = state.sphere === 'handyman' ? address : '';
                }
            } else {
                state.orders.push({
                    id: "ord_" + Date.now().toString(),
                    date: selectedDateStr,
                    time,
                    client,
                    phone,
                    product,
                    price,
                    prepayment: state.sphere === 'handyman' ? 0 : prepayment,
                    templateName,
                    address: state.sphere === 'handyman' ? address : '',
                    status: 'pending'
                });
            }

            saveUserData();
            closeOrderModal();
            renderCalendar();
            renderOrders();
            autoSyncWithServer();
        }

        function deleteOrder(id) {
            if (confirm("Удалить выбранную запись?")) {
                state.orders = state.orders.filter(o => o.id !== id);
                saveUserData();
                renderCalendar();
                renderOrders();
                autoSyncWithServer();
            }
        }

        // ОТЧЕТЫ ПО СТАТУСУ COMPLETED
        function generateReport() {
            let fromStr = document.getElementById('reportDateFrom').value;
            let toStr = document.getElementById('reportDateTo').value;
            
            if (!fromStr || !toStr) {
                const now = new Date();
                fromStr = formatDate(new Date(now.getFullYear(), now.getMonth(), 1));
                toStr = formatDate(new Date(now.getFullYear(), now.getMonth() + 1, 0));
                document.getElementById('reportDateFrom').value = fromStr;
                document.getElementById('reportDateTo').value = toStr;
            }
            
            const from = new Date(fromStr); from.setHours(0,0,0,0);
            const to = new Date(toStr); to.setHours(23,59,59,999);
            
            let revenue = 0;
            state.orders.forEach(o => {
                if (o.status === 'completed') {
                    const d = new Date(o.date);
                    if (d >= from && d <= to) revenue += o.price;
                }
            });
            
            let expenses = 0;
            if (state.sphere !== 'handyman') {
                state.expenses.forEach(e => {
                    const d = new Date(e.date);
                    if (d >= from && d <= to) expenses += e.amount;
                });
            }
            
            document.getElementById('repRevenue').textContent = `${revenue.toLocaleString()} ₽`;

            if (state.sphere === 'handyman') {
                document.getElementById('reportExpenseBlock').classList.add('hidden');
                document.getElementById('reportProfitBlock').classList.add('hidden');
                document.getElementById('reportFinanceGrid').className = "grid grid-cols-1 text-center";
            } else {
                document.getElementById('reportExpenseBlock').classList.remove('hidden');
                document.getElementById('reportProfitBlock').classList.remove('hidden');
                document.getElementById('reportFinanceGrid').className = "grid grid-cols-3 gap-2 text-center";
                document.getElementById('repExpenses').textContent = `${expenses.toLocaleString()} ₽`;
                document.getElementById('repProfit').textContent = `${(revenue - expenses).toLocaleString()} ₽`;
            }

            document.getElementById('reportResultCard').classList.remove('hidden');
        }

        // ПРОФИЛЬ И СОХРАНЕНИЕ СМЕНЫ СФЕРЫ
        function openProfileModal() {
            document.getElementById('profNameInput').value = document.getElementById('profileName').textContent;
            document.getElementById('profSphereSelect').value = state.sphere;
            document.getElementById('modalName').textContent = document.getElementById('profileName').textContent;
            document.getElementById('modalAvatar').textContent = document.getElementById('profileName').textContent.charAt(0).toUpperCase();
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }

        function saveProfile() {
            const newName = document.getElementById('profNameInput').value.trim();
            const newSphere = document.getElementById('profSphereSelect').value;
            
            if(!newName) { alert("Имя мастера не может быть пустым!"); return; }

            const oldSphere = state.sphere;
            document.getElementById('profileName').textContent = newName;
            state.sphere = newSphere;

            // Сохраняем имя и сферу до перезагрузки состояний
            localStorage.setItem(`masterapp_name_${currentTelegramId}`, newName);
            localStorage.setItem(`masterapp_sphere_${currentTelegramId}`, newSphere);

            if (oldSphere !== newSphere) {
                // Полная перезагрузка структуры под новую сферу во избежание наложений
                const key = getStorageKey();
                const raw = localStorage.getItem(key);
                if (raw) {
                    try {
                        state = JSON.parse(raw);
                        state.sphere = newSphere;
                    } catch(e) {}
                } else {
                    generateDemoDataForSphere(newSphere);
                }
            }
            
            saveUserData();
            applySphereSettings();
            closeProfileModal();
        }

        function openExpenseModal() {
            document.getElementById('expAmount').value = '';
            document.getElementById('expComment').value = '';
            document.getElementById('expenseModal').classList.remove('hidden');
        }
        function closeExpenseModal() { document.getElementById('expenseModal').classList.add('hidden'); }

        function saveExpense() {
            const amount = parseFloat(document.getElementById('expAmount').value) || 0;
            const comment = document.getElementById('expComment').value.trim();
            if (amount <= 0 || !comment) { alert("Укажите сумму и назначение расхода!"); return; }
            
            state.expenses.push({ id: Date.now().toString(), date: selectedDateStr, amount, comment });
            saveUserData();
            closeExpenseModal();
            if(!document.getElementById('content-reports').classList.contains('hidden')) generateReport();
        }

        function clearAllData() {
            if (confirm("Вы уверены, что хотите полностью стереть базу данных этого аккаунта?")) {
                localStorage.removeItem(getStorageKey());
                generateDemoDataForSphere(state.sphere);
                applySphereSettings();
            }
        }

        // ИСПРАВЛЕНА СИНХРОНИЗАЦИЯ ЧАТА (ПЕРЕДАЕТСЯ КОРРЕКТНЫЙ currentTelegramId)
        function autoSyncWithServer() {
            const dataPayload = {
                chat_id: currentTelegramId, 
                user_name: document.getElementById('profileName').textContent,
                sphere: state.sphere,
                orders: state.orders
            };

            fetch('https://uncord-masterapp-backend.hf.space/sync', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPayload)
            }).catch(e => console.error(e));
        }

        function exportToExcel() {
            const dataPayload = {
                chat_id: currentTelegramId, 
                user_name: document.getElementById('profileName').textContent,
                sphere: state.sphere,
                orders: state.orders
            };

            fetch('https://uncord-masterapp-backend.hf.space/sync', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPayload)
            })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка бэкенда');
                const botToken = response.headers.get('X-Bot-Token') || response.headers.get('x-bot-token');
                if (!botToken) throw new Error('Не найден X-Bot-Token');
                return response.blob().then(excelBlob => ({ excelBlob, botToken }));
            })
            .then(({ excelBlob, botToken }) => {
                const formData = new FormData();
                formData.append('chat_id', dataPayload.chat_id); // Отправка по корректному ТГ ID
                formData.append('document', excelBlob, 'MasterApp_backup.xlsx');
                formData.append('caption', `📊 Системный бэкап MasterApp`);

                return fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
            })
            .then(tgResponse => {
                if (tgResponse.ok) alert("🚀 Резервная копия успешно отправлена в чат-бот!");
                else alert("Ошибка отправки документа в Telegram");
            })
            .catch(error => alert(`❌ Ошибка бэкапа: ${error.message}`));
        }

        function restoreFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    if(!workbook.SheetNames.includes('SYS_BACKUP')) { alert('Неверный формат файла!'); return; }
                    const jsonRows = XLSX.utils.sheet_to_json(workbook.Sheets['SYS_BACKUP']);
                    let rawStr = jsonRows[0].raw_json.replace(/'/g, '"');
                    const parsed = JSON.parse(rawStr);
                    if(parsed.orders) {
                        state = Object.assign(state, parsed);
                        saveUserData();
                        applySphereSettings();
                        alert('🚀 Данные успешно восстановлены!');
                    }
                } catch(err) { alert('Ошибка структуры файла'); }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function formatDate(date) {
            const offset = date.getTimezoneOffset();
            return new Date(date.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
        }

        window.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
